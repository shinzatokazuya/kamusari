<!-- ═══════════════════════════════════════════════════════
     admin_partida.html — Edição de partida
     ═══════════════════════════════════════════════════════ -->
{% extends "base.html" %}
{% block title %}Editar Partida #{{ partida.id }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

    <div class="flex items-center gap-4 mb-6">
        <a href="/admin?entidade=partida" class="text-sm text-slate-500 hover:text-brand-light">← Voltar</a>
        <h1 class="text-xl font-bold text-slate-100">
            Editar Partida <span class="text-brand-light">#{{ partida.id }}</span>
        </h1>
    </div>

    <p class="text-sm text-slate-400 mb-4">
        <strong class="text-slate-200">{{ partida.mandante }}</strong> vs
        <strong class="text-slate-200">{{ partida.visitante }}</strong>
        — Brasileirão {{ partida.ano }}
    </p>

    <div class="bg-pitch-800 rounded-xl border border-white/10 p-6">
        <form method="POST">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Data (YYYY-MM-DD)</label>
                    <input type="text" name="data" value="{{ partida.data or '' }}" pattern="\d{4}-\d{2}-\d{2}"
                        placeholder="2015-06-01" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Hora (HH:MM)</label>
                    <input type="text" name="hora" value="{{ partida.hora or '' }}" placeholder="16:00" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Fase</label>
                    <input type="text" name="fase" value="{{ partida.fase or '' }}" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Rodada</label>
                    <input type="number" name="rodada" value="{{ partida.rodada or '' }}" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Placar Mandante</label>
                    <input type="number" name="mandante_placar" value="{{ partida.mandante_placar or '' }}" min="0"
                        class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Placar Visitante</label>
                    <input type="number" name="visitante_placar" value="{{ partida.visitante_placar or '' }}" min="0"
                        class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Pênaltis Mandante</label>
                    <input type="number" name="mandante_penalti" value="{{ partida.mandante_penalti or '' }}" min="0"
                        class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Pênaltis Visitante</label>
                    <input type="number" name="visitante_penalti" value="{{ partida.visitante_penalti or '' }}" min="0"
                        class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Prorrogação</label>
                    <select name="prorrogacao" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                         text-slate-200 text-sm rounded px-3 py-2 focus:outline-none">
                        <option value="0" {% if not partida.prorrogacao %}selected{% endif %}>Não</option>
                        <option value="1" {% if partida.prorrogacao %}selected{% endif %}>Sim</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-slate-400 uppercase mb-1">Público</label>
                    <input type="number" name="publico" value="{{ partida.publico or '' }}" min="0" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                        text-slate-200 text-sm rounded px-3 py-2 focus:outline-none" />
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-xs text-slate-400 uppercase mb-1">Estádio</label>
                    <select name="estadio_id" class="w-full bg-pitch-700 border border-white/10 focus:border-brand
                         text-slate-200 text-sm rounded px-3 py-2 focus:outline-none">
                        <option value="">– Não informado –</option>
                        {% for est in estadios %}
                        <option value="{{ est.id }}" {% if est.id==partida.estadio_id %}selected{% endif %}>
                            {{ est.estadio }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

            </div>

            <div class="mt-6 flex gap-3">
                <button type="submit" class="px-6 py-2 bg-brand hover:bg-brand-dark text-white text-sm font-semibold
                       rounded transition">
                    💾 Salvar Alterações
                </button>
                <a href="/jogo/{{ partida.id }}" class="px-4 py-2 border border-white/10 hover:border-white/20 text-slate-400
                  hover:text-slate-200 text-sm rounded transition">
                    Ver página pública
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
